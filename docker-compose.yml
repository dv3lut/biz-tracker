services:
  db:
    image: postgres:16-alpine
    container_name: biz-tracker-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE__NAME}
      POSTGRES_USER: ${DATABASE__USER}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD}
    ports:
      - "${DATABASE__PORT:-15432}:5432"
    volumes:
      - biz_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE__USER}"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  biz_tracker_postgres_data:
    driver: local
