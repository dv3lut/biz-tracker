version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sirene-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sirene_db
      POSTGRES_USER: sirene_user
      POSTGRES_PASSWORD: sirene_password
    ports:
      - "15432:5432"
    volumes:
      - biz_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sirene_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  biz_tracker_postgres_data:
    driver: local
