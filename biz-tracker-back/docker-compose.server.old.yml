services:
  biztracker-back:
    image: dv3lut/biz-tracker-back-api:latest
    container_name: biztracker-back
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VIRTUAL_HOST=api.business-tracker.fr          # adapte selon ton DNS
      - LETSENCRYPT_HOST=api.business-tracker.fr
      - LETSENCRYPT_EMAIL=ops@business-tracker.fr
      - VIRTUAL_PORT=8080
    depends_on:
      biztracker-postgres:
        condition: service_healthy
    networks:
      - nginx-proxy
      - internal
    volumes:
      - ./logs:/app/logs

  biztracker-postgres:
    image: postgres:16-alpine
    container_name: biztracker-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE__NAME}
      - POSTGRES_USER=${DATABASE__USER}
      - POSTGRES_PASSWORD=${DATABASE__PASSWORD}
    ports:
      - "5434:5432"                   # garde un accès psql sans empiéter sur les autres projets
    networks:
      - internal
    volumes:
      - biztracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER} -d ${DATABASE__NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  biztracker-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: biztracker-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - internal
    ports:
      - "9200:9200"
    volumes:
      - biztracker_elasticsearch_data:/usr/share/elasticsearch/data

  biztracker-kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: biztracker-kibana
    restart: unless-stopped
    depends_on:
      - biztracker-elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://business-tracker.elasticsearch:9200
      - VIRTUAL_HOST=kibana.business-tracker.fr          # optionnel : exposer via nginx-proxy
      - LETSENCRYPT_HOST=kibana.business-tracker.fr
      - LETSENCRYPT_EMAIL=ops@biztracker.fr
      - VIRTUAL_PORT=5601
    networks:
      - nginx-proxy
      - internal
    ports:
      - "5601:5601"

volumes:
  biztracker_postgres_data:
  biztracker_elasticsearch_data:

networks:
  nginx-proxy:
    external: true
  internal:
    driver: bridge