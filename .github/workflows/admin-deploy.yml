name: Deploy biz-tracker Admin to VPS

on:
  push:
    tags:
      - 'v*'          # Release globale : déploie tous les services
      - 'admin/v*'    # Release ciblée admin uniquement
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./biz-tracker-admin
          file: ./biz-tracker-admin/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/biz-tracker-admin:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/biz-tracker-admin:latest
          build-args: |
            VITE_APP_API_BASE_URL=${{ secrets.VITE_APP_API_BASE_URL }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            if ! [ -x "$(command -v docker-compose)" ]; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.29.6/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi
            cd ~/biz-tracker-admin
            docker-compose pull
            docker-compose down
            docker-compose up -d
